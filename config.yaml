publicHost: https://auth.example.com
keyPath: /etc/ghost-idp/certs/tls.key

attestation:
  enabled: false
  requiredFor:
    - mobile
  headerName: X-Device-Id
  formField: device_id
  provider: noop

token:
  ttl: 2h
  config:
    dev:
      ttl: 3h
      audience:
        - https://api.dev.kompass.gg
        - https://dashboard.dev.kompass.gg
    prod:
      ttl: 2h
      audience:
        - https://api.kompass.gg
        - https://dashboard.kompass.gg

clients:
  web:
    - name: kompass-web-dev
      config: dev
      allowedOrigins:
        - "http://localhost:3000"
        - "https://dev.kompass.gg"
    - name: kompass-web-prod
      config: prod
      allowedOrigins:
        - "https://kompass.gg"
        - "https://www.kompass.gg"

  mobile:
    - name: kompass-mobile-dev
      config: dev
    - name: kompass-mobile-prod
      config: prod
